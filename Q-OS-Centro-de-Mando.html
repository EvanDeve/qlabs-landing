<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q · Centro de Mando — Q Labs</title>
<meta name="description" content="Portal Staff de Q Labs. La operación completa de la agencia en un solo lugar: pipeline, calendario, Heroes, recomendaciones y SOPs.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Q · CENTRO DE MANDO — Prototipo Portal Staff Q Labs
   Tokens de marca + base
   ============================================================ */
:root{
  /* Marca — violeta / índigo (dossier / spy) */
  --ink-deep:#0d0a1c; --ink-side:#141031; --ink-side-2:#1b1540;
  --b-900:#241a52; --b-700:#3a2ba0; --b-600:#5a41e0; --b-500:#6d54f3;
  --b-400:#8a75f7; --b-300:#ab9cfa; --b-100:#ece8fe; --b-50:#f5f3ff;

  /* Superficies */
  --canvas:#f5f5fa; --surface:#ffffff; --surface-2:#faf9ff; --surface-3:#f3f2fb;
  --line:#e7e6f1; --line-2:#efeef7; --line-strong:#dad8ea;

  /* Texto */
  --ink:#1a1730; --ink-2:#66627e; --ink-3:#9793ad; --ink-inv:#f4f3fb;

  /* Semántica */
  --ok:#14a06a; --ok-bg:#e4f6ee; --ok-line:#bfe8d5;
  --warn:#c07414; --warn-bg:#fbefdb; --warn-line:#f0d8a8;
  --risk:#df4650; --risk-bg:#fce9ea; --risk-line:#f6c6ca;
  --info:#3b6ef5; --info-bg:#e8f0ff;

  /* Etapas del pipeline */
  --st-pend:#8892a6; --st-estr:#6d54f3; --st-guion:#9b6cf0; --st-aprob:#c07414;
  --st-grab:#1f9ac9; --st-edit:#3b6ef5; --st-qa:#7c4de0; --st-rev:#c9791b;
  --st-prog:#14a08a; --st-pub:#14a06a;

  /* Tipografía */
  --font-display:'Outfit',system-ui,sans-serif;
  --font-sans:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;

  /* Radios / sombras / motion */
  --r-sm:7px; --r-md:11px; --r-lg:15px; --r-xl:20px; --r-full:9999px;
  --sh-sm:0 1px 2px rgba(26,23,48,.06),0 1px 3px rgba(26,23,48,.04);
  --sh-md:0 4px 14px rgba(26,23,48,.07),0 2px 4px rgba(26,23,48,.04);
  --sh-lg:0 18px 40px rgba(26,23,48,.14),0 4px 10px rgba(26,23,48,.06);
  --sh-glow:0 0 0 3px rgba(109,84,243,.14);
  --t-fast:140ms cubic-bezier(.4,0,.2,1); --t-base:230ms cubic-bezier(.4,0,.2,1);
  --sidebar-w:250px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-sans);
  font-size:14px; line-height:1.55; color:var(--ink);
  background:var(--canvas);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  font-feature-settings:"cv02","cv03","cv04","ss01";
}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:700;line-height:1.2;letter-spacing:-.01em;color:var(--ink)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:14px;color:var(--ink)}
svg{display:block}
::selection{background:var(--b-100)}
:focus-visible{outline:2px solid var(--b-500);outline-offset:2px;border-radius:4px}
.skip{position:absolute;left:12px;top:-60px;background:var(--b-500);color:#fff;padding:10px 16px;border-radius:var(--r-md);z-index:200;font-weight:600;transition:top var(--t-fast)}
.skip:focus{top:12px}

/* Scrollbar */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d6d4e6;border-radius:20px;border:2px solid var(--canvas)}
::-webkit-scrollbar-thumb:hover{background:#c3c0da}

/* Etiqueta mono estilo "clasificación" */
.mono{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.eyebrow{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:var(--b-500)}

/* ============================================================
   LAYOUT
   ============================================================ */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}

/* ---- Sidebar ---- */
.sidebar{
  position:sticky;top:0;height:100vh;
  background:linear-gradient(185deg,var(--ink-side) 0%,var(--ink-deep) 100%);
  display:flex;flex-direction:column;color:var(--ink-inv);
  border-right:1px solid rgba(255,255,255,.06);overflow:hidden;z-index:40;
}
.sidebar::before{content:"";position:absolute;top:-80px;left:-40px;width:260px;height:260px;
  background:radial-gradient(circle,rgba(109,84,243,.35),transparent 65%);filter:blur(8px);pointer-events:none}
.sb-brand{display:flex;align-items:center;gap:11px;padding:20px 18px 18px;position:relative;z-index:1}
.q-mark{width:38px;height:38px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(150deg,var(--b-400),var(--b-600));
  display:grid;place-items:center;box-shadow:0 6px 16px rgba(109,84,243,.45),inset 0 1px 0 rgba(255,255,255,.25)}
.q-mark svg{width:22px;height:22px}
.sb-brand .name{font-family:var(--font-display);font-weight:800;font-size:17px;letter-spacing:-.02em;line-height:1}
.sb-brand .sub{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--b-300);margin-top:3px}

.sb-search{margin:6px 14px 12px;position:relative;z-index:1}
.sb-search input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);
  color:var(--ink-inv);border-radius:var(--r-md);padding:9px 12px 9px 34px;font-size:13px;transition:var(--t-fast)}
.sb-search input::placeholder{color:rgba(244,243,251,.42)}
.sb-search input:focus{background:rgba(255,255,255,.1);border-color:var(--b-400);outline:none}
.sb-search .ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:rgba(244,243,251,.5)}
.sb-search .kbd{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:10px;
  color:rgba(244,243,251,.4);border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:1px 5px}

.sb-nav{flex:1;overflow-y:auto;padding:4px 12px;position:relative;z-index:1}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-color:transparent}
.nav-label{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(244,243,251,.34);padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  padding:9px 11px;border-radius:var(--r-md);color:rgba(244,243,251,.72);font-size:13.5px;font-weight:500;
  transition:var(--t-fast);position:relative;margin-bottom:1px}
.nav-item .ic{color:rgba(244,243,251,.6);transition:var(--t-fast);flex-shrink:0}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item:hover .ic{color:var(--b-300)}
.nav-item.active{background:linear-gradient(90deg,rgba(109,84,243,.32),rgba(109,84,243,.12));color:#fff;font-weight:600}
.nav-item.active .ic{color:#fff}
.nav-item.active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--b-400)}
.nav-item .count{margin-left:auto;font-family:var(--font-mono);font-size:10.5px;font-weight:600;
  background:rgba(255,255,255,.1);color:rgba(244,243,251,.8);border-radius:var(--r-full);padding:1px 7px;min-width:20px;text-align:center}
.nav-item.alert .count{background:rgba(223,70,80,.9);color:#fff}

.sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.07);position:relative;z-index:1}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r-md);transition:var(--t-fast)}
.sb-user:hover{background:rgba(255,255,255,.06)}
.sb-user .av{width:32px;height:32px;border-radius:9px;background:linear-gradient(150deg,var(--b-400),var(--b-600));
  display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
.sb-user .meta{min-width:0}
.sb-user .u-name{font-size:13px;font-weight:600;color:#fff;line-height:1.2}
.sb-user .u-role{font-size:11px;color:rgba(244,243,251,.5);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user .g-dot{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px rgba(20,160,106,.2);flex-shrink:0}

/* ---- Main ---- */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;background:rgba(245,245,250,.82);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);padding:14px 26px;display:flex;align-items:center;gap:16px}
.tb-left{min-width:0}
.tb-crumb{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-3);margin-bottom:1px}
.tb-crumb .sep{opacity:.5}
.tb-title{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:-.02em;line-height:1.1}
.tb-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.tb-icon-btn{width:38px;height:38px;border-radius:var(--r-md);background:var(--surface);border:1px solid var(--line);
  display:grid;place-items:center;color:var(--ink-2);transition:var(--t-fast);position:relative}
.tb-icon-btn:hover{border-color:var(--line-strong);color:var(--ink);box-shadow:var(--sh-sm)}
.tb-icon-btn .badge{position:absolute;top:6px;right:7px;width:8px;height:8px;border-radius:50%;background:var(--risk);border:2px solid var(--surface)}
.mobile-menu{display:none}

.content{padding:26px;max-width:1400px;width:100%}
.screen{display:none;animation:fadeUp .34s cubic-bezier(.2,.6,.2,1)}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ============================================================
   COMPONENTES GENÉRICOS
   ============================================================ */
.btn{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;padding:9px 15px;
  border-radius:var(--r-md);transition:var(--t-fast);border:1px solid transparent;white-space:nowrap}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--b-500);color:#fff;box-shadow:0 2px 6px rgba(109,84,243,.3)}
.btn-primary:hover{background:var(--b-600);box-shadow:0 4px 12px rgba(109,84,243,.4);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{background:var(--surface);color:var(--ink);border-color:var(--line)}
.btn-ghost:hover{border-color:var(--line-strong);box-shadow:var(--sh-sm)}
.btn-soft{background:var(--b-50);color:var(--b-600);border-color:var(--b-100)}
.btn-soft:hover{background:var(--b-100)}
.btn-sm{padding:6px 11px;font-size:12.5px}
.btn-sm svg{width:14px;height:14px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-sm)}
.card-pad{padding:18px}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.section-head h2{font-size:15px;font-weight:700}
.section-head h2.big{font-size:18px}
.section-head .act{margin-left:auto;display:flex;gap:8px;align-items:center}
.link-more{font-size:12.5px;font-weight:600;color:var(--b-600);display:inline-flex;align-items:center;gap:3px}
.link-more:hover{color:var(--b-700)}

/* Chips / badges */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:var(--r-full);
  background:var(--surface-3);color:var(--ink-2);border:1px solid var(--line)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.badge-st{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:var(--r-full)}
.prio{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.05em;padding:2px 7px;border-radius:5px}
.prio-alta{background:var(--risk-bg);color:var(--risk)}
.prio-media{background:var(--warn-bg);color:var(--warn)}
.prio-baja{background:var(--surface-3);color:var(--ink-3)}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:var(--surface-3);color:var(--ink-2)}
.sop-tag{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.03em;padding:2px 7px;border-radius:5px;
  background:var(--b-50);color:var(--b-600);border:1px solid var(--b-100)}
.risk-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:var(--r-full)}
.risk-ok{background:var(--ok-bg);color:var(--ok)}
.risk-warn{background:var(--warn-bg);color:var(--warn)}
.risk-risk{background:var(--risk-bg);color:var(--risk)}
.risk-onb{background:var(--info-bg);color:var(--info)}

/* Avatares */
.av-chip{display:inline-flex;align-items:center;gap:7px}
.av{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-weight:700;font-size:10.5px;color:#fff;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.2)}
.av.sm{width:22px;height:22px;font-size:9.5px;border-radius:7px}
.av.lg{width:44px;height:44px;font-size:15px;border-radius:12px}
.av-stack{display:flex}
.av-stack .av{border:2px solid var(--surface);margin-left:-8px}
.av-stack .av:first-child{margin-left:0}

/* ============================================================
   DASHBOARD
   ============================================================ */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:15px 16px;box-shadow:var(--sh-sm);
  position:relative;overflow:hidden;transition:var(--t-fast)}
.kpi:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
.kpi .k-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.kpi .k-ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.kpi .k-label{font-size:11.5px;font-weight:600;color:var(--ink-2);line-height:1.2}
.kpi .k-num{font-family:var(--font-display);font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1}
.kpi .k-sub{font-size:11px;color:var(--ink-3);margin-top:5px;display:flex;align-items:center;gap:4px}
.kpi .k-sub .up{color:var(--ok);font-weight:600}
.kpi .k-sub .down{color:var(--risk);font-weight:600}

.dash-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:22px}
.stack{display:flex;flex-direction:column;gap:22px}

/* Atención list */
.attn-item{display:flex;align-items:center;gap:13px;padding:12px 14px;border-radius:var(--r-md);border:1px solid var(--line-2);
  transition:var(--t-fast);cursor:pointer;background:var(--surface)}
.attn-item:hover{border-color:var(--line-strong);box-shadow:var(--sh-sm);background:var(--surface-2)}
.attn-item+.attn-item{margin-top:8px}
.attn-bar{width:3px;align-self:stretch;border-radius:3px;flex-shrink:0}
.attn-body{flex:1;min-width:0}
.attn-title{font-size:13.5px;font-weight:600;line-height:1.3}
.attn-meta{font-size:12px;color:var(--ink-2);margin-top:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.attn-right{display:flex;align-items:center;gap:10px;flex-shrink:0}

/* Semana / agenda mini */
.week-row{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--line-2)}
.week-row:last-child{border-bottom:none}
.week-when{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--ink-3);width:52px;flex-shrink:0;text-align:right}
.week-type{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.week-body{flex:1;min-width:0;font-size:13px;font-weight:500}
.week-body small{display:block;color:var(--ink-3);font-size:11.5px;font-weight:400}

/* Carga equipo */
.load-row{display:flex;align-items:center;gap:12px;padding:9px 0}
.load-row .lr-name{width:120px;flex-shrink:0;display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600}
.load-track{flex:1;height:8px;background:var(--surface-3);border-radius:var(--r-full);overflow:hidden;position:relative}
.load-fill{height:100%;border-radius:var(--r-full);transition:width .6s cubic-bezier(.2,.7,.2,1)}
.load-val{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--ink-2);width:58px;text-align:right;flex-shrink:0}

/* Estado cuentas tabla */
.acct-table{width:100%;border-collapse:collapse}
.acct-table th{text-align:left;font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-3);font-weight:600;padding:0 12px 10px;border-bottom:1px solid var(--line)}
.acct-table td{padding:11px 12px;border-bottom:1px solid var(--line-2);font-size:13px;vertical-align:middle}
.acct-table tr{cursor:pointer;transition:var(--t-fast)}
.acct-table tbody tr:hover{background:var(--surface-2)}
.acct-hero{display:flex;align-items:center;gap:10px;font-weight:600}
.hero-mono{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-family:var(--font-display);font-weight:800;font-size:12px;color:#fff;flex-shrink:0}

/* ============================================================
   PIPELINE / KANBAN
   ============================================================ */
.pipe-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-group{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:3px}
.filter-chip{font-size:12.5px;font-weight:500;padding:5px 11px;border-radius:var(--r-sm);color:var(--ink-2);transition:var(--t-fast)}
.filter-chip:hover{background:var(--surface-3)}
.filter-chip.on{background:var(--b-500);color:#fff;font-weight:600}
.kanban{display:flex;gap:14px;overflow-x:auto;padding:4px 4px 18px;scroll-snap-type:x proximity}
.kcol{flex:0 0 262px;background:var(--surface-3);border:1px solid var(--line-2);border-radius:var(--r-lg);
  display:flex;flex-direction:column;max-height:calc(100vh - 230px);scroll-snap-align:start;transition:var(--t-fast)}
.kcol.drop-hi{background:var(--b-50);border-color:var(--b-300);box-shadow:var(--sh-glow)}
.kcol-head{display:flex;align-items:center;gap:8px;padding:12px 13px 10px;position:sticky;top:0}
.kcol-head .dot{width:9px;height:9px}
.kcol-head .kc-name{font-size:12.5px;font-weight:700;letter-spacing:-.01em}
.kcol-head .kc-count{font-family:var(--font-mono);font-size:10.5px;font-weight:600;color:var(--ink-3);
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-full);padding:0 7px;min-width:20px;text-align:center}
.kcol-head .kc-sop{margin-left:auto}
.kcol-body{flex:1;overflow-y:auto;padding:4px 10px 12px;display:flex;flex-direction:column;gap:9px;min-height:60px}
.kcol-body::-webkit-scrollbar{width:6px}

.kcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:11px 12px;box-shadow:var(--sh-sm);
  cursor:grab;transition:box-shadow var(--t-fast),transform var(--t-fast),border-color var(--t-fast)}
.kcard:hover{box-shadow:var(--sh-md);border-color:var(--line-strong);transform:translateY(-1px)}
.kcard:active{cursor:grabbing}
.kcard.dragging{opacity:.45;transform:rotate(1.5deg) scale(.98)}
.kc-top{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.kc-hero{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--ink-2)}
.kc-num{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--ink-3);font-weight:500}
.kc-title{font-size:13px;font-weight:600;line-height:1.35;margin-bottom:9px;letter-spacing:-.01em}
.kc-mid{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:9px}
.kc-foot{display:flex;align-items:center;gap:8px;padding-top:9px;border-top:1px solid var(--line-2)}
.kc-links{display:flex;gap:5px}
.kc-lnk{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;background:var(--surface-3);color:var(--ink-3);transition:var(--t-fast)}
.kc-lnk:hover{background:var(--b-50);color:var(--b-600)}
.kc-lnk.on{color:var(--b-500);background:var(--b-50)}
.kc-due{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--ink-2)}
.kc-due.late{color:var(--risk)}
.kc-due svg{width:12px;height:12px}

/* ============================================================
   CALENDARIO
   ============================================================ */
.cal-head{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.cal-nav{display:flex;align-items:center;gap:4px}
.cal-nav button{width:34px;height:34px;border-radius:var(--r-md);border:1px solid var(--line);background:var(--surface);
  display:grid;place-items:center;color:var(--ink-2);transition:var(--t-fast)}
.cal-nav button:hover{border-color:var(--line-strong);color:var(--ink)}
.cal-month{font-family:var(--font-display);font-size:19px;font-weight:700;text-transform:capitalize;min-width:150px}
.cal-legend{margin-left:auto;display:flex;gap:14px;flex-wrap:wrap}
.leg{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2);font-weight:500}
.cal-grid{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-sm)}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface-3);border-bottom:1px solid var(--line)}
.cal-dow div{padding:10px;text-align:center;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--ink-3)}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:112px;border-right:1px solid var(--line-2);border-bottom:1px solid var(--line-2);padding:7px 8px;position:relative;transition:var(--t-fast)}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.out{background:var(--surface-2)}
.cal-cell:hover{background:var(--surface-2)}
.cal-daynum{font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:5px;display:inline-flex;width:24px;height:24px;align-items:center;justify-content:center;border-radius:7px}
.cal-cell.today .cal-daynum{background:var(--b-500);color:#fff}
.cal-cell.out .cal-daynum{color:var(--ink-3);opacity:.55}
.cal-ev{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 6px;border-radius:6px;margin-bottom:3px;
  cursor:pointer;transition:var(--t-fast);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;border-left:3px solid}
.cal-ev:hover{transform:translateX(2px);filter:brightness(.97)}
.cal-ev .evd{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ============================================================
   HEROES + DOSSIER
   ============================================================ */
.hero-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.hcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:17px;box-shadow:var(--sh-sm);
  cursor:pointer;transition:var(--t-fast);position:relative;overflow:hidden}
.hcard:hover{box-shadow:var(--sh-md);transform:translateY(-3px);border-color:var(--line-strong)}
.hcard-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.hcard-mono{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-family:var(--font-display);font-weight:800;font-size:16px;color:#fff;flex-shrink:0;box-shadow:var(--sh-sm)}
.hcard-name{font-size:15.5px;font-weight:700;line-height:1.2}
.hcard-ind{font-size:12px;color:var(--ink-2);margin-top:2px}
.hcard-loc{font-size:11.5px;color:var(--ink-3);margin-top:3px;display:flex;align-items:center;gap:4px}
.hcard-foot{display:flex;align-items:center;gap:8px;margin-top:6px;padding-top:13px;border-top:1px solid var(--line-2)}
.hcard-next{margin-left:auto;font-size:11.5px;color:var(--ink-2)}
.hcard-next b{font-weight:600;color:var(--ink)}

/* Dossier */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:16px;transition:var(--t-fast)}
.back-btn:hover{color:var(--b-600)}
.dossier-hd{background:linear-gradient(135deg,var(--ink-side),var(--ink-deep));border-radius:var(--r-xl);padding:24px 26px;
  color:var(--ink-inv);position:relative;overflow:hidden;box-shadow:var(--sh-md);margin-bottom:20px}
.dossier-hd::before{content:"";position:absolute;top:-60px;right:-30px;width:280px;height:280px;
  background:radial-gradient(circle,rgba(109,84,243,.4),transparent 65%);pointer-events:none}
.dossier-hd::after{content:"EXPEDIENTE CLASIFICADO";position:absolute;bottom:14px;right:22px;font-family:var(--font-mono);
  font-size:10px;letter-spacing:.2em;color:rgba(255,255,255,.12);font-weight:600}
.dsr-row{display:flex;align-items:center;gap:18px;position:relative;z-index:1;flex-wrap:wrap}
.dsr-mono{width:66px;height:66px;border-radius:18px;display:grid;place-items:center;font-family:var(--font-display);font-weight:800;font-size:24px;color:#fff;flex-shrink:0;box-shadow:0 8px 20px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.25)}
.dsr-id{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;color:var(--b-300);margin-bottom:5px;text-transform:uppercase}
.dsr-name{font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1}
.dsr-ind{font-size:13.5px;color:rgba(244,243,251,.72);margin-top:6px}
.dsr-stats{display:flex;gap:26px;margin-left:auto;flex-wrap:wrap}
.dsr-stat .ds-n{font-family:var(--font-display);font-size:22px;font-weight:800;line-height:1}
.dsr-stat .ds-l{font-size:11px;color:rgba(244,243,251,.55);margin-top:3px}
.dsr-meta{display:flex;gap:22px;margin-top:20px;padding-top:18px;border-top:1px solid rgba(255,255,255,.1);position:relative;z-index:1;flex-wrap:wrap}
.dsr-meta .dm{min-width:0}
.dsr-meta .dm-l{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,243,251,.45);margin-bottom:3px}
.dsr-meta .dm-v{font-size:13px;font-weight:600;color:#fff}

.dossier-tabs{display:flex;gap:3px;border-bottom:1px solid var(--line);margin-bottom:20px;overflow-x:auto}
.dtab{padding:11px 15px;font-size:13px;font-weight:600;color:var(--ink-2);border-bottom:2px solid transparent;
  transition:var(--t-fast);white-space:nowrap;margin-bottom:-1px}
.dtab:hover{color:var(--ink)}
.dtab.on{color:var(--b-600);border-bottom-color:var(--b-500)}
.dpane{display:none;animation:fadeUp .3s ease}
.dpane.on{display:block}
.dossier-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:20px}

/* Drive gallery */
.drive-bar{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface-3);border:1px solid var(--line);
  border-radius:var(--r-md);margin-bottom:14px}
.drive-bar .g-ic{width:30px;height:30px;flex-shrink:0}
.drive-path{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-2);font-weight:500}
.drive-gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:11px}
.drive-item{border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;background:var(--surface);transition:var(--t-fast);cursor:pointer}
.drive-item:hover{box-shadow:var(--sh-md);transform:translateY(-2px);border-color:var(--line-strong)}
.drive-thumb{aspect-ratio:9/12;display:grid;place-items:center;position:relative;overflow:hidden}
.drive-thumb .play{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.9);display:grid;place-items:center;color:var(--ink);backdrop-filter:blur(4px)}
.drive-cap{padding:8px 9px;font-size:11px;font-weight:600;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Idea / list items */
.idea-item{display:flex;gap:11px;padding:13px 14px;border:1px solid var(--line-2);border-radius:var(--r-md);transition:var(--t-fast);background:var(--surface)}
.idea-item+.idea-item{margin-top:9px}
.idea-item:hover{border-color:var(--line-strong);box-shadow:var(--sh-sm)}
.idea-n{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--b-500);flex-shrink:0;padding-top:1px}
.idea-body{flex:1;min-width:0}
.idea-title{font-size:13.5px;font-weight:600;line-height:1.35}
.idea-desc{font-size:12.5px;color:var(--ink-2);margin-top:3px;line-height:1.5}

/* Métricas */
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.metric-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:14px}
.metric-box .m-n{font-family:var(--font-display);font-size:24px;font-weight:800;letter-spacing:-.02em}
.metric-box .m-l{font-size:11.5px;color:var(--ink-2);margin-top:3px}

/* ============================================================
   RECOMENDACIONES / BUSINESS FEED (staff)
   ============================================================ */
.feed-layout{display:grid;grid-template-columns:1.15fr 1fr;gap:22px;align-items:start}
.composer{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-sm);overflow:hidden}
.composer-hd{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.composer-hd .ch-ic{width:32px;height:32px;border-radius:9px;background:var(--b-50);color:var(--b-600);display:grid;place-items:center;flex-shrink:0}
.composer-body{padding:18px}
.field{margin-bottom:15px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
.field .hint{font-weight:400;color:var(--ink-3);font-size:11px}
.inp{width:100%;padding:9px 12px;border:1px solid var(--line-strong);border-radius:var(--r-md);background:var(--surface);transition:var(--t-fast)}
.inp:focus{outline:none;border-color:var(--b-400);box-shadow:var(--sh-glow)}
textarea.inp{resize:vertical;min-height:70px;line-height:1.5}
.seg{display:flex;gap:6px;flex-wrap:wrap}
.seg-opt{font-size:12px;font-weight:600;padding:6px 12px;border-radius:var(--r-md);border:1px solid var(--line);background:var(--surface);color:var(--ink-2);transition:var(--t-fast)}
.seg-opt:hover{border-color:var(--line-strong)}
.seg-opt.on{background:var(--b-500);color:#fff;border-color:var(--b-500)}
.cat-opt.on{color:#fff}
.composer-foot{padding:14px 18px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;background:var(--surface-2)}

.preview-wrap{position:sticky;top:96px}
.preview-label{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-3);margin-bottom:12px;font-weight:500}
.phone{background:linear-gradient(180deg,#faf9ff,#f3f2fb);border:1px solid var(--line);border-radius:var(--r-xl);padding:16px;box-shadow:var(--sh-md)}
.phone-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.phone-bar .pb-logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(150deg,var(--b-400),var(--b-600));display:grid;place-items:center}
.phone-bar .pb-t{font-family:var(--font-display);font-weight:700;font-size:13px}
.phone-bar .pb-s{font-size:10px;color:var(--ink-3);font-family:var(--font-mono);letter-spacing:.05em}

.feed-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-sm)}
.fc-cat{display:flex;align-items:center;gap:7px;padding:10px 14px;font-family:var(--font-mono);font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.fc-body{padding:4px 15px 15px}
.fc-title{font-family:var(--font-display);font-size:17px;font-weight:700;letter-spacing:-.01em;line-height:1.25;margin-bottom:8px}
.fc-desc{font-size:13px;color:var(--ink-2);line-height:1.55;margin-bottom:12px}
.fc-why{display:flex;gap:9px;padding:11px 12px;background:var(--b-50);border:1px solid var(--b-100);border-radius:var(--r-md);margin-bottom:13px}
.fc-why .w-ic{color:var(--b-500);flex-shrink:0;margin-top:1px}
.fc-why .w-txt{font-size:12px;color:var(--b-700);line-height:1.5}
.fc-why .w-txt b{font-weight:700}
.fc-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;font-size:11.5px;color:var(--ink-2)}
.fc-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fc-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:12.5px;font-weight:600;padding:9px;border-radius:var(--r-md);transition:var(--t-fast)}
.fc-btn.primary{background:var(--b-500);color:#fff;grid-column:1/-1}
.fc-btn.primary:hover{background:var(--b-600)}
.fc-btn.ghost{background:var(--surface-3);color:var(--ink);border:1px solid var(--line)}
.fc-btn.ghost:hover{border-color:var(--line-strong);background:var(--surface)}

/* Sent feed list */
.rec-item{display:flex;align-items:center;gap:13px;padding:13px 15px;border:1px solid var(--line-2);border-radius:var(--r-md);background:var(--surface);transition:var(--t-fast);cursor:pointer}
.rec-item+.rec-item{margin-top:9px}
.rec-item:hover{border-color:var(--line-strong);box-shadow:var(--sh-sm)}
.rec-cat-ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.rec-body{flex:1;min-width:0}
.rec-title{font-size:13.5px;font-weight:600;line-height:1.3}
.rec-sub{font-size:12px;color:var(--ink-2);margin-top:2px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.rec-status{font-size:11px;font-weight:600;padding:3px 9px;border-radius:var(--r-full);flex-shrink:0}
.rs-sent{background:var(--info-bg);color:var(--info)}
.rs-exec{background:var(--warn-bg);color:var(--warn)}
.rs-done{background:var(--ok-bg);color:var(--ok)}
.rs-saved{background:var(--surface-3);color:var(--ink-2)}

/* ============================================================
   SOPs
   ============================================================ */
.sop-philosophy{display:flex;align-items:center;gap:12px;padding:14px 18px;background:linear-gradient(100deg,var(--b-50),var(--surface));
  border:1px solid var(--b-100);border-radius:var(--r-lg);margin-bottom:22px}
.sop-philosophy .sp-ic{color:var(--b-500);flex-shrink:0}
.sop-philosophy .sp-t{font-family:var(--font-display);font-weight:700;font-size:14px}
.sop-philosophy .sp-s{font-size:12.5px;color:var(--ink-2)}
.sop-area{margin-bottom:26px}
.sop-area-hd{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.sop-area-hd .sa-dot{width:8px;height:8px;border-radius:50%}
.sop-area-hd h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-family:var(--font-mono);color:var(--ink-2)}
.sop-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
.sop-card{display:flex;align-items:center;gap:13px;padding:14px 15px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-md);box-shadow:var(--sh-sm);cursor:pointer;transition:var(--t-fast)}
.sop-card:hover{box-shadow:var(--sh-md);transform:translateY(-2px);border-color:var(--line-strong)}
.sop-code{font-family:var(--font-mono);font-size:11px;font-weight:600;color:#fff;padding:5px 8px;border-radius:8px;flex-shrink:0;letter-spacing:.02em}
.sop-info{flex:1;min-width:0}
.sop-name{font-size:13.5px;font-weight:600;line-height:1.3}
.sop-owner{font-size:11.5px;color:var(--ink-3);margin-top:2px;display:flex;align-items:center;gap:6px}
.sop-state{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--ok);box-shadow:0 0 0 3px var(--ok-bg)}

/* SOP detail */
.sop-detail-hd{background:linear-gradient(135deg,var(--ink-side),var(--ink-deep));border-radius:var(--r-xl);padding:24px 26px;color:var(--ink-inv);margin-bottom:22px;position:relative;overflow:hidden}
.sop-detail-hd::before{content:"";position:absolute;top:-50px;right:-20px;width:220px;height:220px;background:radial-gradient(circle,rgba(109,84,243,.35),transparent 65%)}
.sop-detail-hd .sd-code{display:inline-block;font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.1em;
  background:rgba(255,255,255,.12);padding:5px 11px;border-radius:8px;margin-bottom:12px;position:relative;z-index:1}
.sop-detail-hd h1{font-size:24px;color:#fff;position:relative;z-index:1}
.sop-detail-hd .sd-obj{font-size:13.5px;color:rgba(244,243,251,.75);margin-top:8px;max-width:640px;position:relative;z-index:1;line-height:1.55}
.sd-props{display:flex;gap:24px;margin-top:20px;padding-top:18px;border-top:1px solid rgba(255,255,255,.1);position:relative;z-index:1;flex-wrap:wrap}
.sd-prop .sdp-l{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(244,243,251,.45);margin-bottom:4px}
.sd-prop .sdp-v{font-size:13px;font-weight:600;color:#fff}
.sop-section{margin-bottom:24px}
.sop-section h3{font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sop-section h3 .n{font-family:var(--font-mono);font-size:11px;color:var(--b-500);background:var(--b-50);width:24px;height:24px;
  display:grid;place-items:center;border-radius:7px;border:1px solid var(--b-100)}
.step-list{counter-reset:step;display:flex;flex-direction:column;gap:2px}
.step{display:flex;gap:13px;padding:12px 4px;border-bottom:1px solid var(--line-2)}
.step:last-child{border-bottom:none}
.step-n{counter-increment:step;flex-shrink:0;width:26px;height:26px;border-radius:8px;background:var(--b-500);color:#fff;
  display:grid;place-items:center;font-family:var(--font-mono);font-size:12px;font-weight:600}
.step-n::before{content:counter(step,decimal-leading-zero)}
.step-txt{flex:1;font-size:13.5px;line-height:1.5;padding-top:2px}
.step-txt b{font-weight:600}
.check-list{list-style:none;display:flex;flex-direction:column;gap:9px}
.check-list li{display:flex;gap:10px;font-size:13.5px;line-height:1.5;align-items:flex-start}
.check-list li .ck{width:19px;height:19px;border-radius:6px;border:1.5px solid var(--b-300);background:var(--b-50);flex-shrink:0;margin-top:1px;position:relative}
.check-list li .ck::after{content:"";position:absolute;left:5px;top:2px;width:5px;height:9px;border:solid var(--b-500);border-width:0 2px 2px 0;transform:rotate(45deg)}
.err-list{list-style:none;display:flex;flex-direction:column;gap:9px}
.err-list li{display:flex;gap:10px;font-size:13px;line-height:1.5;padding:10px 12px;background:var(--warn-bg);border:1px solid var(--warn-line);border-radius:var(--r-md);color:#7a4d0e}
.err-list li svg{flex-shrink:0;color:var(--warn);margin-top:1px}

/* ============================================================
   INTEGRACIONES
   ============================================================ */
.integ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:26px}
.integ-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;box-shadow:var(--sh-sm)}
.integ-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.integ-logo{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;flex-shrink:0;background:var(--surface-3);border:1px solid var(--line)}
.integ-name{font-size:15px;font-weight:700;font-family:var(--font-display)}
.integ-desc{font-size:12px;color:var(--ink-2);margin-top:1px}
.integ-status{margin-left:auto}
.conn-badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:var(--r-full);background:var(--ok-bg);color:var(--ok)}
.conn-badge.off{background:var(--surface-3);color:var(--ink-3)}
.integ-detail{font-size:12.5px;color:var(--ink-2);line-height:1.6;padding-top:13px;border-top:1px solid var(--line-2)}
.integ-detail .row{display:flex;justify-content:space-between;padding:3px 0}
.integ-detail .row b{color:var(--ink);font-weight:600}

/* Roles table */
.roles-table{width:100%;border-collapse:collapse}
.roles-table th{text-align:left;font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:600;padding:0 14px 10px;border-bottom:1px solid var(--line)}
.roles-table td{padding:12px 14px;border-bottom:1px solid var(--line-2);font-size:13px}
.perm-yes{color:var(--ok);font-weight:600}
.perm-no{color:var(--ink-3)}
.perm-partial{color:var(--warn);font-weight:600}

/* ============================================================
   DRAWER + TOAST + EMPTY
   ============================================================ */
.drawer-overlay{position:fixed;inset:0;background:rgba(13,10,28,.4);backdrop-filter:blur(3px);z-index:100;opacity:0;
  visibility:hidden;transition:var(--t-base)}
.drawer-overlay.open{opacity:1;visibility:visible}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(480px,92vw);background:var(--surface);z-index:101;
  box-shadow:var(--sh-lg);transform:translateX(100%);transition:transform var(--t-base);overflow-y:auto;display:flex;flex-direction:column}
.drawer.open{transform:none}
.drawer-hd{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--line);padding:18px 22px;
  display:flex;align-items:center;gap:12px;z-index:2}
.drawer-close{width:34px;height:34px;border-radius:var(--r-md);background:var(--surface-3);display:grid;place-items:center;color:var(--ink-2);transition:var(--t-fast);margin-left:auto;flex-shrink:0}
.drawer-close:hover{background:var(--line);color:var(--ink)}
.drawer-body{padding:22px;flex:1}
.dr-section{margin-bottom:20px}
.dr-section h4{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:9px}
.dr-kv{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--line-2);font-size:13.5px}
.dr-kv .k{color:var(--ink-2)}
.dr-kv .v{font-weight:600;text-align:right}
.dr-comment{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--line-2)}
.dr-comment .ts{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--b-500);flex-shrink:0}

.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:10px;align-items:center}
.toast{display:flex;align-items:center;gap:11px;background:var(--ink-deep);color:#fff;padding:13px 18px;border-radius:var(--r-md);
  box-shadow:var(--sh-lg);font-size:13.5px;font-weight:500;animation:toastIn .3s cubic-bezier(.2,.7,.2,1);max-width:90vw}
.toast .t-ic{width:24px;height:24px;border-radius:7px;background:rgba(109,84,243,.3);display:grid;place-items:center;flex-shrink:0;color:var(--b-300)}
.toast.ok .t-ic{background:rgba(20,160,106,.25);color:#5fd6a2}
@keyframes toastIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.empty{text-align:center;padding:40px 20px;color:var(--ink-3)}
.empty svg{margin:0 auto 12px;opacity:.4}
.empty p{font-size:13.5px}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.mt{margin-top:22px}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width:1140px){
  .kpi-row{grid-template-columns:repeat(3,1fr)}
  .dash-grid,.dossier-grid,.feed-layout,.two-col{grid-template-columns:1fr}
  .preview-wrap{position:static}
  .metric-grid{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;width:270px;transform:translateX(-100%);transition:transform var(--t-base)}
  .sidebar.open{transform:none;box-shadow:var(--sh-lg)}
  .mobile-menu{display:grid}
  .content{padding:18px}
  .topbar{padding:12px 16px}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .sb-scrim{position:fixed;inset:0;background:rgba(13,10,28,.4);z-index:39;opacity:0;visibility:hidden;transition:var(--t-base)}
  .sb-scrim.open{opacity:1;visibility:visible}
}
@media (max-width:560px){
  .kpi-row{grid-template-columns:1fr}
  .dsr-stats{margin-left:0;width:100%}
  .fc-actions{grid-template-columns:1fr}
  .tb-title{font-size:17px}
}

/* ============================================================

   ============================================================ */
function av(memberId, cls){const m=team[memberId]; if(!m) return '<span class="av '+(cls||'')+'" style="background:#8892a6">?</span>';
  return '<span class="av '+(cls||'')+'" style="background:'+m.color+'" title="'+m.name+'">'+m.ini+'</span>';}
function avChip(memberId){const m=team[memberId]; if(!m) return '<span class="chip">Sin asignar</span>';
  return '<span class="av-chip">'+av(memberId,'sm')+'<span style="font-size:12px;font-weight:600">'+m.name+'</span></span>';}
function heroDot(id){const h=heroes[id]; if(!h) return '';
  return '<span style="display:inline-flex;align-items:center;gap:5px"><span class="dot" style="background:'+h.color+'"></span>'+h.name+'</span>';}
function prio(p){const map={alta:'Alta',media:'Media',baja:'Baja'}; return '<span class="prio prio-'+p+'">'+ic('flag',11)+map[p]+'</span>';}
function platform(pl){return '<span class="tag">'+pl+'</span>';}
function sopTag(code){return code?'<span class="sop-tag">'+code+'</span>':'';}
function riskPill(r){const map={ok:['risk-ok','En ritmo'],warn:['risk-warn','Requiere atención'],risk:['risk-risk','Detenido'],onb:['risk-onb','Onboarding']};
  const m=map[r]||map.ok; return '<span class="risk-pill '+m[0]+'">'+(r==='ok'?ic('check',12):r==='onb'?ic('sparkle',12):ic('alert',12))+m[1]+'</span>';}
function heroMono(id,size,cls){const h=heroes[id]; const s=size||30;
  return '<span class="'+(cls||'hero-mono')+'" style="background:'+h.color+';width:'+s+'px;height:'+s+'px">'+h.mono+'</span>';}
function badgeSt(stId){const s=stageById(stId); return '<span class="badge-st" style="background:color-mix(in srgb,'+s.color+' 14%,white);color:'+s.color+'"><span class="dot" style="background:'+s.color+'"></span>'+s.name+'</span>';}
function esc(str){return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderNav(){
  let h='';
  nav.forEach(n=>{
    if(n.group){h+='<div class="nav-label">'+n.group+'</div>'; return;}
    h+='<button class="nav-item'+(n.id===current?' active':'')+'" onclick="go(\''+n.id+'\')">'+ic(n.icon,18)+'<span>'+n.label+'</span>'+(n.count?'<span class="count">'+n.count+'</span>':'')+'</button>';
  });
  document.getElementById('sbNav').innerHTML=h;
}
function go(screen){
  current=screen;
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active', s.dataset.screen===screen));
  const t=titles[screen]||['Q Labs',screen];
  document.getElementById('tbCrumb').textContent=t[0];
  document.getElementById('tbTitle').textContent=t[1];
  renderNav();
  // reset sub-views
  if(screen==='heroes'){document.getElementById('heroesListView').style.display='block';document.getElementById('dossierView').style.display='none';}
  if(screen==='sops'){document.getElementById('sopsListView').style.display='block';document.getElementById('sopDetailView').style.display='none';}
  document.getElementById('main').scrollTo(0,0);
  window.scrollTo(0,0);
  toggleSidebar(false);
}

/* ---------- Sidebar móvil ---------- */
function toggleSidebar(open){
  const sb=document.getElementById('sidebar'), sc=document.getElementById('sbScrim');
  if(open===undefined) open=!sb.classList.contains('open');
  sb.classList.toggle('open',open); sc.classList.toggle('open',open);
}

/* ---------- Toast ---------- */
function toast(msg, ok){
  const w=document.getElementById('toastWrap');
  const el=document.createElement('div');
  el.className='toast'+(ok?' ok':'');
  el.innerHTML='<span class="t-ic">'+(ok?ic('check',15):ic('sparkle',15))+'</span>'+esc(msg);
  w.appendChild(el);
  setTimeout(()=>{el.style.transition='opacity .3s,transform .3s';el.style.opacity='0';el.style.transform='translateY(10px)';setTimeout(()=>el.remove(),300);}, 2600);
}

function openDrawer(hd, body){
  document.getElementById('drawerHd').innerHTML=hd;

  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');

}

   ============================================================ */
function renderCalendar(){
  const dow=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const leading=2; // Jul 1 2026 = miércoles (semana inicia lunes)
  const daysInMonth=31;
  let legend='';
  Object.keys(evType).forEach(k=>{const t=evType[k]; legend+='<span class="leg"><span class="dot" style="background:'+t.c+'"></span>'+t.lbl+'</span>';});

  let cells='';
  for(let i=0;i<35;i++){
    let dayNum, out=false, aug=false;
    if(i<leading){out=true; dayNum=29+i;}
    else if(i-leading<daysInMonth){dayNum=i-leading+1;}
    else {out=true; aug=true; dayNum=i-leading-daysInMonth+1;}
    const isToday=(!out && dayNum===TODAY);
    let evH='';
    if(!out){const dayEvents=events.filter(e=>e.d===dayNum);
      dayEvents.slice(0,3).forEach(e=>{const t=evType[e.ty]; const nm=e.h?heroes[e.h].name:e.t;
        evH+='<div class="cal-ev" style="background:'+t.bg+';border-left-color:'+t.c+';color:color-mix(in srgb,'+t.c+' 78%,black)" onclick="openEvent('+dayNum+',\''+e.ty+'\',\''+(e.h||'')+'\',\''+esc(e.t).replace(/\x27/g,"")+'\')"><span class="evd" style="background:'+t.c+'"></span>'+esc(e.h?heroes[e.h].name:e.t)+'</div>';});
      if(dayEvents.length>3) evH+='<div style="font-size:10.5px;color:var(--ink-3);font-weight:600;padding-left:4px">+'+(dayEvents.length-3)+' más</div>';
    }
    cells+='<div class="cal-cell'+(out?' out':'')+(isToday?' today':'')+'"><span class="cal-daynum">'+dayNum+'</span>'+evH+'</div>';
  }
  document.getElementById('calMount').innerHTML=
    '<div class="cal-head"><div class="cal-nav"><button onclick="toast(\'El prototipo muestra Julio 2026\')" aria-label="Mes anterior">'+ic('chevL',18)+'</button><button onclick="toast(\'El prototipo muestra Julio 2026\')" aria-label="Mes siguiente">'+ic('chevR',18)+'</button></div>'+
      '<div class="cal-month">Julio 2026</div>'+
      '<div class="filter-group" style="margin-left:8px"><button class="filter-chip on">Mes</button><button class="filter-chip" onclick="toast(\'Vista semanal — próximamente\')">Semana</button><button class="filter-chip" onclick="toast(\'Vista diaria — próximamente\')">Día</button></div>'+
      '<div class="cal-legend">'+legend+'</div></div>'+
    '<div class="cal-grid"><div class="cal-dow">'+dow.map(d=>'<div>'+d+'</div>').join('')+'</div><div class="cal-body">'+cells+'</div></div>';
}
